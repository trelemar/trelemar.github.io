<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Low Simmer Games</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      text-align: center;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      gap: 20px;
      box-sizing: border-box;
    }

    img {
      width: 60%;
      max-width: 240px;
      height: auto;
    }

    p {
      font-size: 16px;
      opacity: 0.8;
      margin: 0;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.6;
    }

    .links a {
      color: #ccc;
      text-decoration: none;
    }

    .links a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="lowsimmer_logo_v2.png" alt="Low Simmer Games Logo">
    <p>Cooking stuff up.<br>More soon.</p>

    <div class="links">
      <a href="https://bsky.app/profile/lowsimmer.games">BlueSky</a>
    </div>
  </div>
</body>
</html>
