<!DOCTYPE html>
<html>
<head>
  <title>Low Simmer Games</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    img {
      max-width: 240px;
    }

    p {
      font-size: 16px;
      opacity: 0.8;
      margin: 0;
    }

    .links {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.6;
    }

    .links a {
      color: #ccc;
      text-decoration: none;
    }

    .links a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="lowsimmer_logo.png" alt="Low Simmer Games Logo">
    <p>Let it simmer. More soon.</p>

    <div class="links">
      <a href="https://twitter.com/yourhandle">Twitter</a>
      <a href="https://instagram.com/yourhandle">Instagram</a>
      <a href="https://your-substack-url">Newsletter</a>
    </div>
  </div>
</body>
</html>
